<script>
(function() {
  var STORAGE_KEY = "blog_history";
  var MAX_ITEMS = 50;
  var drawer, overlay, trigger, body, clearBtn, closeBtn;
  var isOpen = false;
  var isDragging = false;
  var dragStartY = 0;
  var dragStartTop = 0;
  var savedTop = null;

  // Helpers
  function getHistory() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }
  function saveHistory(arr) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, MAX_ITEMS)));
    } catch(e) {}
  }

  function getPageInfo() {
    var title = document.title.split(" | ")[0].trim();
    var url = window.location.pathname + window.location.search + window.location.hash;
    var excerpt = "";
    // Try to get og:description or first paragraph
    var metaDesc = document.querySelector("meta[name=\"description\"]");
    if (metaDesc) excerpt = metaDesc.getAttribute("content") || "";
    if (!excerpt) {
      var firstP = document.querySelector(".article-body p, .page-body p, .blog-card-title");
      if (firstP) excerpt = firstP.textContent.trim().substring(0, 120);
    }
    return { id: url, title: title, url: url, excerpt: excerpt.substring(0, 150), time: new Date().toISOString() };
  }

  // Record current page visit
  function recordVisit() {
    // Skip homepage
    var path = window.location.pathname.replace(/\/$/, "") || "/";
    if (path === "/" || path === "/index.html") return;
    var info = getPageInfo();
    if (!info.title) return;
    var history = getHistory();
    // Remove duplicate if exists
    history = history.filter(function(item) { return item.id !== info.id; });
    // Add to front
    history.unshift(info);
    saveHistory(history);
  }

  // Format time
  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    var min = Math.floor(diff / 60000);
    if (min < 1) return "刚刚";
    if (min < 60) return min + " 分钟前";
    var hours = Math.floor(min / 60);
    if (hours < 24) return hours + " 小时前";
    var days = Math.floor(hours / 24);
    if (days < 7) return days + " 天前";
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
  }

  // Render history list
  function renderHistory() {
    if (!body) return;
    var history = getHistory();
    if (history.length === 0) {
      body.innerHTML = '<div class="history-empty"><div class="history-empty-icon">&#128218;</div><div class="history-empty-title">暂无浏览历史</div><div class="history-empty-desc">浏览博客文章后，您的阅读记录会出现在这里</div><div class="history-empty-guide">&#8592; 点击左侧按钮开始阅读</div></div>';
      return;
    }
    var html = "";
    history.forEach(function(item, index) {
      html += '<a class="history-item" href="' + item.url + '" data-index="' + index + '">';
      html += '  <div class="history-item-info">';
      html += '    <div class="history-item-title">' + item.title + '</div>';
      html += '    <div class="history-item-time">' + formatTime(item.time) + '</div>';
      html += '  </div>';
      html += '  <button class="history-item-delete" data-index="' + index + '" onclick="event.preventDefault();event.stopPropagation();deleteHistoryItem(' + index + ')" aria-label="删除">';
      html += '    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
      html += '  </button>';
      html += '</a>';
    });
    body.innerHTML = html;
  }

  // Open/close drawer
  function openDrawer() {
    isOpen = true;
    renderHistory();
    drawer.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  window.closeHistoryDrawer = function() {
    isOpen = false;
    drawer.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  };

  window.deleteHistoryItem = function(index) {
    var history = getHistory();
    history.splice(index, 1);
    saveHistory(history);
    renderHistory();
  };

  window.clearAllHistory = function() {
    if (confirm("确定要清空所有浏览历史吗？")) {
      saveHistory([]);
      renderHistory();
    }
  };

  // Drag functionality
  function initDrag() {
    if (!trigger) return;
    // Restore saved position
    try {
      savedTop = localStorage.getItem("history_trigger_top");
      if (savedTop !== null) {
        trigger.style.top = savedTop + "px";
        trigger.style.transform = "none";
      }
    } catch(e) {}

    trigger.addEventListener("pointerdown", function(e) {
      if (e.pointerType === "touch" && Math.abs(e.clientX - trigger.getBoundingClientRect().right) > 30) return;
      isDragging = true;
      trigger.classList.add("dragging");
      dragStartY = e.clientY;
      dragStartTop = trigger.getBoundingClientRect().top;
      trigger.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    trigger.addEventListener("pointermove", function(e) {
      if (!isDragging) return;
      var deltaY = e.clientY - dragStartY;
      var newTop = dragStartTop + deltaY;
      var maxTop = window.innerHeight - trigger.offsetHeight - 10;
      newTop = Math.max(10, Math.min(newTop, maxTop));
      trigger.style.top = newTop + "px";
      trigger.style.transform = "none";
    });

    trigger.addEventListener("pointerup", function(e) {
      if (!isDragging) return;
      isDragging = false;
      trigger.classList.remove("dragging");
      trigger.releasePointerCapture(e.pointerId);
      // Did we drag? If moved less than 5px, treat as click
      var moved = Math.abs(e.clientY - dragStartY);
      if (moved < 5) {
        // It was a click, toggle drawer
        if (isOpen) {
          closeHistoryDrawer();
        } else {
          openDrawer();
        }
      } else {
        // Save position
        try { localStorage.setItem("history_trigger_top", trigger.style.top.replace("px", "")); } catch(e) {}
      }
    });

    trigger.addEventListener("pointercancel", function() {
      isDragging = false;
      trigger.classList.remove("dragging");
    });
  }

  // Init
  function init() {
    drawer = document.getElementById("historyDrawer");
    overlay = document.getElementById("historyOverlay");
    trigger = document.getElementById("historyTrigger");
    body = document.getElementById("historyBody");
    clearBtn = document.getElementById("historyClearBtn");
    closeBtn = document.getElementById("historyCloseBtn");

    if (!drawer || !trigger) return;

    // Close button
    if (closeBtn) closeBtn.addEventListener("click", closeHistoryDrawer);
    // Overlay click
    if (overlay) overlay.addEventListener("click", closeHistoryDrawer);
    // Clear button
    if (clearBtn) clearBtn.addEventListener("click", clearAllHistory);
    // ESC key
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && isOpen) closeHistoryDrawer();
    });

    initDrag();
    recordVisit();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

  }

  var dateHeadingStyle = "grid-column:1/-1;font-family:Playfair Display,Georgia,serif;font-size:20px;font-weight:600;color:#141413;margin:8px 0 4px;padding-bottom:8px;border-bottom:1px solid #e6dfd8;";
  var pinnedLabelStyle = "grid-column:1/-1;font-family:JetBrains Mono,monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#cc785c;margin-bottom:-8px;display:flex;align-items:center;gap:8px;";
  var pinnedDot = '<span style="display:inline-block;width:8px;height:8px;background:#cc785c;border-radius:50%;"></span>';

  function renderPage() {
    var tp = totalPages();
    if (state.page > tp) state.page = tp;
    var start = (state.page - 1) * state.pageSize;
    var end = Math.min(start + state.pageSize, ALL_POSTS.length);
    var pagePosts = ALL_POSTS.slice(start, end);
    var html = "";
    var hasPinned = pagePosts.some(function(p) { return p.pinned; });
    var curDate = null;
    pagePosts.forEach(function(post) {
      if (hasPinned && post.pinned) {
        if (curDate !== "__pinned__") {
          html += '<div style="' + pinnedLabelStyle + '">' + pinnedDot + '置顶</div>';
          curDate = "__pinned__";
        }
      } else if (!post.pinned) {
        if (curDate === "__pinned__") curDate = null;
        if (post.date !== curDate) {
          html += '<div style="' + dateHeadingStyle + '">' + esc(post.date) + '</div>';
          curDate = post.date;
        }
      }
      html += renderCard(post);
    });

    var gridHtml = '<div class="blog-cards">' + html + '</div>';
    listEl.innerHTML = gridHtml;
    listEl.classList.remove("fading");

    currentEl.textContent = state.page;
    totalEl.textContent = tp;
    prevBtn.disabled = state.page <= 1;
    nextBtn.disabled = state.page >= tp;
    rangeEl.textContent = "显示 " + (start + 1) + "-" + end + " 条，共 " + ALL_POSTS.length + " 条";
    jumpInput.value = state.page;
    jumpInput.classList.remove("invalid");
    errorEl.classList.remove("show");
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("show");
    jumpInput.classList.add("invalid");
    clearTimeout(errorEl._t);
    errorEl._t = setTimeout(function() { errorEl.classList.remove("show"); }, 2500);
  }

  function changePage(newPage) {
    var tp = totalPages();
    if (newPage < 1 || newPage > tp) return;
    listEl.classList.add("fading");
    setTimeout(function() { state.page = newPage; renderPage(); }, 180);
  }

  prevBtn.addEventListener("click", function() { changePage(state.page - 1); });
  nextBtn.addEventListener("click", function() { changePage(state.page + 1); });

  sizeSelect.addEventListener("change", function() {
    state.pageSize = parseInt(sizeSelect.value, 10) || 10;
    state.page = 1;
    localStorage.setItem(STORAGE_PAGESIZE, state.pageSize);
    listEl.classList.add("fading");
    setTimeout(renderPage, 180);
  });

  function doJump() {
    var raw = jumpInput.value.trim();
    if (!/^\d+$/.test(raw)) { showError("没有该页面"); return; }
    var n = parseInt(raw, 10);
    var tp = totalPages();
    if (n < 1 || n > tp) { showError("没有该页面"); return; }
    changePage(n);
  }

  jumpBtn.addEventListener("click", doJump);
  jumpInput.addEventListener("keydown", function(e) { if (e.key === "Enter") doJump(); });
  jumpInput.addEventListener("input", function() { jumpInput.classList.remove("invalid"); errorEl.classList.remove("show"); });

  document.addEventListener("keydown", function(e) {
    var tag = e.target.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (e.key === "ArrowLeft" && state.page > 1) changePage(state.page - 1);
    if (e.key === "ArrowRight" && state.page < totalPages()) changePage(state.page + 1);
  });
  if (sizeSelect) sizeSelect.value = defaultSize;

  renderPage();
})();
</script>
</body>
</html>
