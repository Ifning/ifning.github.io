var CURRENT_THEME = "default";
var tagAnimEnabled = true;
var panelAnimEnabled = true;
var panelOpen = false;

(function() {
  var saved = localStorage.getItem("page2-theme");
  var theme = null, isDark = null;
  if (saved) {
    try { var cfg = JSON.parse(saved); theme = cfg.theme; isDark = cfg.dark; } catch(e) {}
  }
  // Dark mode
  var dark = (isDark === true) || (isDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches);
  if (dark) document.documentElement.classList.add("dark-mode");
  // Color theme
  if (theme && T[theme]) { CURRENT_THEME = theme; applyTheme(); }
  // Tag animation toggle
  tagAnimEnabled = (cfg ? cfg.tagAnim !== false : true);
  if (!tagAnimEnabled) document.documentElement.setAttribute("data-tag-anim", "off");
  // Panel animation toggle
  panelAnimEnabled = (cfg ? cfg.panelAnim !== false : true);
  if (!panelAnimEnabled) document.documentElement.setAttribute("data-panel-anim", "off");

function applyTheme() {
  var t = T[CURRENT_THEME];
  if (!t) return;
  var isDark = document.documentElement.classList.contains("dark-mode");
  var colors = isDark ? t.D : t.L;
  if (!colors) return;
  var r = document.documentElement;
  Object.keys(colors).forEach(function(k) {
    r.style.setProperty(k, colors[k]);
  });
  r.setAttribute("data-theme", CURRENT_THEME);
  r.style.setProperty("color-scheme", isDark ? "dark" : "light");
  document.querySelectorAll("img").forEach(function(img) {
    if (isDark) { img.style.setProperty("opacity", "0.75", "important"); }
    else { img.style.removeProperty("opacity"); }
  });
}

function saveThemeConfig() {
  try {
    localStorage.setItem("page2-theme", JSON.stringify({
      theme: CURRENT_THEME,
      dark: document.documentElement.classList.contains("dark-mode"),
      tagAnim: tagAnimEnabled,
      panelAnim: panelAnimEnabled
    }));
  } catch(e) {}
}

function toggleDark() {
  var html = document.documentElement;
  html.classList.add("transitioning");
  html.classList.toggle("dark-mode");
  applyTheme();
  saveThemeConfig();
  updatePanelUI();
  setTimeout(function() { html.classList.remove("transitioning"); }, 400);

function selectTheme(key) {

  CURRENT_THEME = key;

}

function injectPanel() {
  var backdrop = document.createElement("div");
  backdrop.className = "theme-panel-backdrop";
  backdrop.setAttribute("id", "themeBackdrop");
  backdrop.addEventListener("click", closePanel);
  document.body.appendChild(backdrop);
  var panel = document.createElement("div");
  panel.className = "theme-panel";
  panel.setAttribute("id", "themePanel");
  panel.innerHTML = buildPanelHTML();
  document.body.appendChild(panel);
  // Attach listeners
  panel.querySelectorAll(".theme-mode-option").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var mode = btn.dataset.mode;
      var isDark = document.documentElement.classList.contains("dark-mode");
      if ((mode === "dark" && !isDark) || (mode === "light" && isDark)) toggleDark();
    });
  });
  panel.querySelectorAll(".theme-scheme-card").forEach(function(card) {
    card.addEventListener("click", function() { selectTheme(card.dataset.theme); });
  });
  // Tag animation toggle
  var animToggle = panel.querySelector("#tagAnimToggle");
  if (animToggle) {
    animToggle.checked = tagAnimEnabled;
    animToggle.addEventListener("change", function() {
      tagAnimEnabled = animToggle.checked;
      if (tagAnimEnabled) { document.documentElement.removeAttribute("data-tag-anim"); }
      else { document.documentElement.setAttribute("data-tag-anim", "off"); }
      saveThemeConfig();
    });
  }
  // Panel animation toggle
  var panelAnimToggle = panel.querySelector("#panelAnimToggle");
  if (panelAnimToggle) {
    panelAnimToggle.checked = panelAnimEnabled;
    panelAnimToggle.addEventListener("change", function() {
      panelAnimEnabled = panelAnimToggle.checked;
      if (panelAnimEnabled) { document.documentElement.removeAttribute("data-panel-anim"); }
      else { document.documentElement.setAttribute("data-panel-anim", "off"); }
      saveThemeConfig();
    });
  }
}

function openPanel() {
  panelOpen = true;
  var panel = document.getElementById("themePanel");
  var backdrop = document.getElementById("themeBackdrop");
  panel.classList.remove("closing");
  backdrop.classList.remove("closing");
  panel.classList.add("show");
  backdrop.classList.add("show");
  document.body.style.overflow = "hidden";
  updatePanelUI();
}

function closePanel() {
  panelOpen = false;
  var panel = document.getElementById("themePanel");
  var backdrop = document.getElementById("themeBackdrop");
  panel.classList.add("closing");
  backdrop.classList.add("closing");
  // Wait for close animation then remove show
  setTimeout(function() {
    panel.classList.remove("show", "closing");
    backdrop.classList.remove("show", "closing");
    document.body.style.overflow = "";
  }, 250);
}

function updatePanelUI() {
  var panel = document.getElementById("themePanel");
  if (!panel) return;
  var isDark = document.documentElement.classList.contains("dark-mode");
  panel.querySelectorAll(".theme-mode-option").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.mode === (isDark ? "dark" : "light"));
  });
  panel.querySelectorAll(".theme-scheme-card").forEach(function(card) {
    card.classList.toggle("active", card.dataset.theme === CURRENT_THEME);
  });
  var animToggle = panel.querySelector("#tagAnimToggle");
  if (animToggle) animToggle.checked = tagAnimEnabled;
  var panelAnimToggle = panel.querySelector("#panelAnimToggle");
  if (panelAnimToggle) panelAnimToggle.checked = panelAnimEnabled;
}

window.__ThemeConfig = { getConfig: function() { return { theme: CURRENT_THEME, dark: document.documentElement.classList.contains("dark-mode"), name: T[CURRENT_THEME] ? T[CURRENT_THEME].name : "" }; } };

function initThemePanel() {
  injectPanel();
  applyTheme();
  var btn = document.getElementById("themeToggleBtn");
  if (btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      panelOpen ? closePanel() : openPanel();
    });
  }
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && panelOpen) closePanel();
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initThemePanel);
} else {
  initThemePanel();
}
</script>

<script>
(function() {
  var STORAGE_KEY = "blog_history";
  var MAX_ITEMS = 50;
  var drawer, overlay, trigger, body, clearBtn, closeBtn;
  var isOpen = false;
  var isDragging = false;
  var dragStartY = 0;
  var dragStartTop = 0;
  var savedTop = null;

  // Helpers
  function getHistory() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }
  function saveHistory(arr) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, MAX_ITEMS)));
    } catch(e) {}
  }

  function getPageInfo() {
    var title = document.title.split(" | ")[0].trim();
    var url = window.location.pathname + window.location.search + window.location.hash;
    var excerpt = "";
    // Try to get og:description or first paragraph
    var metaDesc = document.querySelector("meta[name=\"description\"]");
    if (metaDesc) excerpt = metaDesc.getAttribute("content") || "";
    if (!excerpt) {
      var firstP = document.querySelector(".article-body p, .page-body p, .blog-card-title");
      if (firstP) excerpt = firstP.textContent.trim().substring(0, 120);
    }
    return { id: url, title: title, url: url, excerpt: excerpt.substring(0, 150), time: new Date().toISOString() };
  }

  // Record current page visit
  function recordVisit() {
    // Skip homepage
    var path = window.location.pathname.replace(/\/$/, "") || "/";
    if (path === "/" || path === "/index.html") return;
    var info = getPageInfo();
    if (!info.title) return;
    var history = getHistory();
    // Remove duplicate if exists
    history = history.filter(function(item) { return item.id !== info.id; });
    // Add to front
    history.unshift(info);
    saveHistory(history);
  }

  // Format time
  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    var min = Math.floor(diff / 60000);
    if (min < 1) return "刚刚";
    if (min < 60) return min + " 分钟前";
    var hours = Math.floor(min / 60);
    if (hours < 24) return hours + " 小时前";
    var days = Math.floor(hours / 24);
    if (days < 7) return days + " 天前";
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
  }

  // Render history list
  function renderHistory() {
    if (!body) return;
    var history = getHistory();
    if (history.length === 0) {
      body.innerHTML = '<div class="history-empty"><div class="history-empty-icon">&#128218;</div><div class="history-empty-title">暂无浏览历史</div><div class="history-empty-desc">浏览博客文章后，您的阅读记录会出现在这里</div><div class="history-empty-guide">&#8592; 点击左侧按钮开始阅读</div></div>';
      return;
    }
    var html = "";
    history.forEach(function(item, index) {
      html += '<a class="history-item" href="' + item.url + '" data-index="' + index + '">';
      html += '  <div class="history-item-info">';
      html += '    <div class="history-item-title">' + item.title + '</div>';
      html += '    <div class="history-item-time">' + formatTime(item.time) + '</div>';
      html += '  </div>';
      html += '  <button class="history-item-delete" data-index="' + index + '" onclick="event.preventDefault();event.stopPropagation();deleteHistoryItem(' + index + ')" aria-label="删除">';
      html += '    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
      html += '  </button>';
      html += '</a>';
    });
    body.innerHTML = html;
  }

  // Open/close drawer
  function openDrawer() {
    isOpen = true;
    renderHistory();
    drawer.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  window.closeHistoryDrawer = function() {
    isOpen = false;
    drawer.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  };

  window.deleteHistoryItem = function(index) {
    var history = getHistory();
    history.splice(index, 1);
    saveHistory(history);
    renderHistory();
  };

  window.clearAllHistory = function() {
    if (confirm("确定要清空所有浏览历史吗？")) {
      saveHistory([]);
      renderHistory();
    }
  };

  // Drag functionality
  function initDrag() {
    if (!trigger) return;
    // Restore saved position
    try {
      savedTop = localStorage.getItem("history_trigger_top");
      if (savedTop !== null) {
        trigger.style.top = savedTop + "px";
        trigger.style.transform = "none";
      }
    } catch(e) {}

    trigger.addEventListener("pointerdown", function(e) {
      var rect = trigger.getBoundingClientRect();
      if (e.pointerType === "touch" && Math.abs(e.clientX - rect.right) > 50) return;
      isDragging = true;
      trigger.classList.add("dragging");
      dragStartY = e.clientY;
      dragStartTop = trigger.getBoundingClientRect().top;
      trigger.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    trigger.addEventListener("pointermove", function(e) {
      if (!isDragging) return;
      var deltaY = e.clientY - dragStartY;
      var newTop = dragStartTop + deltaY;
      var maxTop = window.innerHeight - trigger.offsetHeight - 10;
      newTop = Math.max(10, Math.min(newTop, maxTop));
      trigger.style.top = newTop + "px";
      trigger.style.transform = "none";
    });

    trigger.addEventListener("pointerup", function(e) {
      if (!isDragging) return;
      isDragging = false;
      trigger.classList.remove("dragging");
      trigger.releasePointerCapture(e.pointerId);
      // Did we drag? If moved less than 5px, treat as click
      var moved = Math.abs(e.clientY - dragStartY);
      if (moved < 5) {
        // It was a click, toggle drawer
        if (isOpen) {
          closeHistoryDrawer();
        } else {
          openDrawer();
        }
      } else {
        // Save position
        try { localStorage.setItem("history_trigger_top", trigger.style.top.replace("px", "")); } catch(e) {}
      }
    });

    trigger.addEventListener("pointercancel", function() {
      isDragging = false;
      trigger.classList.remove("dragging");
    });
  }

  // Init
  function init() {
    drawer = document.getElementById("historyDrawer");
    overlay = document.getElementById("historyOverlay");
    trigger = document.getElementById("historyTrigger");
    body = document.getElementById("historyBody");
    clearBtn = document.getElementById("historyClearBtn");
    closeBtn = document.getElementById("historyCloseBtn");

    if (!drawer || !trigger) return;

    // Close button
    if (closeBtn) closeBtn.addEventListener("click", closeHistoryDrawer);
    // Overlay click
    if (overlay) overlay.addEventListener("click", closeHistoryDrawer);
    // Clear button
    if (clearBtn) clearBtn.addEventListener("click", clearAllHistory);
    // ESC key
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && isOpen) closeHistoryDrawer();
    });

    initDrag();
    recordVisit();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

  if (!ALL_POSTS || ALL_POSTS.length === 0) {
    document.getElementById("blogList").innerHTML = '<p style="padding:40px 0;text-align:center;color:#8e8b82;font-family:Inter,sans-serif;">暂无文章</p>';
    return;
  }
  var STORAGE_PAGESIZE = "blog_pageSize";
  var savedSize = parseInt(localStorage.getItem(STORAGE_PAGESIZE), 10);
  var validSizes = [5, 10, 20, 50];
  var defaultSize = validSizes.indexOf(savedSize) >= 0 ? savedSize : 10;
  var state = { page: 1, pageSize: defaultSize };
  var listEl = document.getElementById("blogList");
  var prevBtn = document.getElementById("pagPrevBtn");
  var nextBtn = document.getElementById("pagNextBtn");
  var sizeSelect = document.getElementById("pagSizeSelect");
  var jumpInput = document.getElementById("pagJumpInput");
  var jumpBtn = document.getElementById("pagJumpBtn");
  var currentEl = document.getElementById("pagCurrent");
  var totalEl = document.getElementById("pagTotal");
  var rangeEl = document.getElementById("pagRange");
  var errorEl = document.getElementById("pagError");

  function totalPages() { return Math.max(1, Math.ceil(ALL_POSTS.length / state.pageSize)); }

  function esc(s) { return String(s||"").replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c]}); }

  function tagColor(name) {
    var palette = ["#cc785c","#4a90a4","#6b8e5e","#8b6bb5","#c4915e","#5b8fa8","#a36b7c","#7a8b5e","#8e6ba8","#5e8b8b","#b07a4a","#6a7fb5","#8b5e6b","#5e8b6a","#9b7b5e","#5e6b8b","#8b8b5e","#7b5e8b","#5e8b7b","#8b5e5e"];
    var hash = 0, t = String(name||"");
    for (var i = 0; i < t.length; i++) hash = t.charCodeAt(i) + ((hash << 5) - hash);
    return palette[Math.abs(hash) % palette.length];
  }

  function renderCard(post) {
    var tagsHtml = "";
    if (post.tags && post.tags.length > 0) {
      post.tags.forEach(function(tag) {
        var c = tagColor(tag);
        tagsHtml += '<span class="blog-card-tag" style="color:' + c + ';border-color:' + c + '33">' + esc(tag) + '</span>';
      });
    } else {

    return '<a href="/' + esc(post.path) + '" class="blog-card">' +

        '<span class="blog-card-words">' + esc(post.words) + '</span>' +
      '</div>' +
    '</a>';
  }

  var dateHeadingStyle = "grid-column:1/-1;font-family:Playfair Display,Georgia,serif;font-size:20px;font-weight:600;color:#141413;margin:8px 0 4px;padding-bottom:8px;border-bottom:1px solid #e6dfd8;";
  var pinnedLabelStyle = "grid-column:1/-1;font-family:JetBrains Mono,monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#cc785c;margin-bottom:-8px;display:flex;align-items:center;gap:8px;";
  var pinnedDot = '<span style="display:inline-block;width:8px;height:8px;background:#cc785c;border-radius:50%;"></span>';

  function renderPage() {

  }

  function changePage(newPage) {

    setTimeout(function() { state.page = newPage; renderPage(); }, 180);
  }

  prevBtn.addEventListener("click", function() { changePage(state.page - 1); });

  sizeSelect.addEventListener("change", function() {

    state.page = 1;

  });

  function doJump() {
    var raw = jumpInput.value.trim();
    if (!/^\d+$/.test(raw)) { showError("没有该页面"); return; }
    var n = parseInt(raw, 10);
    var tp = totalPages();
    if (n < 1 || n > tp) { showError("没有该页面"); return; }
    changePage(n);
  }

  jumpBtn.addEventListener("click", doJump);
  jumpInput.addEventListener("keydown", function(e) { if (e.key === "Enter") doJump(); });
  jumpInput.addEventListener("input", function() { jumpInput.classList.remove("invalid"); errorEl.classList.remove("show"); });

  document.addEventListener("keydown", function(e) {
    var tag = e.target.tagName;

    if (e.key === "ArrowRight" && state.page < totalPages()) changePage(state.page + 1);
  });
  if (sizeSelect) sizeSelect.value = defaultSize;

  renderPage();
})();
