<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>日历 | 月见花园</title>

<style>
:root {
  --bg-body: #faf9f5;
  --bg-nav: #faf9f5;
  --bg-card: #ffffff;

  --text-secondary: #3d3d3a;
  --text-muted: #6c6a64;
  --text-muted-soft: #8e8b82;
  --text-muted-pale: #a3a09a;
  --border-hairline: #e6dfd8;
  --border-strong: #141413;
  --accent: #cc785c;
  --accent-hover: #a9583e;
  --accent-soft: #f5f0e8;
  --overlay: rgba(0,0,0,0.35);
  --heat-l0: #ebedf0;
  --heat-l1: #fce4d6;
  --heat-l2: #f5b999;
  --heat-l3: #e8906b;
  --heat-l4: #cc785c;
}
html.dark-mode {
  --bg-body: #1a1a1a;
  --bg-nav: #1a1a1a;
  --bg-card: #242424;
  --bg-surface: #2a2a2a;
  --bg-surface-hover: #333333;
  --bg-code: #2a2a2a;
  --text-primary: #e8e6e1;
  --text-body: #c8c5be;
  --text-secondary: #b8b5ae;
  --text-muted: #9e9b94;
  --text-muted-soft: #7a7870;
  --text-muted-pale: #7a7870;
  --border-hairline: #2d2d2d;
  --border-strong: #3d3d3d;
  --accent: #cc785c;
  --accent-hover: #b5694d;
  --accent-soft: #2a2a2a;
  --overlay: rgba(0,0,0,0.5);
  --heat-l0: #2d2d2d;
  --heat-l1: #5c3a28;
  --heat-l2: #8a5030;
  --heat-l3: #b56a3c;
  --heat-l4: #cc785c;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-body); color: var(--text-primary); font-family: Inter, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
.nav { display: flex; align-items: center; justify-content: space-between; max-width: 1280px; margin: 0 auto; padding: 20px 48px; border-bottom: 1px solid var(--border-hairline); position: sticky; top: 0; z-index: 10; background: var(--bg-nav); width: 100%; flex-shrink: 0; }
.nav-brand { font-family: "Playfair Display", Georgia, serif; font-size: 24px; font-weight: 700; color: var(--text-primary); text-decoration: none; letter-spacing: -0.3px; }
.nav-right { display: flex; align-items: center; gap: 24px; }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-link { font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
.nav-link:hover { color: var(--accent); }

.cal-nav { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 32px; }

.cal-nav-btn:hover { border-color: var(--accent); background: var(--bg-surface); color: var(--accent); }
.cal-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.cal-heatmap-scroll { overflow-x: auto; }
.cal-heatmap { display: flex; gap: 2px; }
.cal-month-labels { display: flex; gap: 2px; margin-bottom: 6px; height: 16px; }
.cal-month-label { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-muted-soft); text-transform: uppercase; width: 12px; text-align: left; overflow: visible; white-space: nowrap; }
.cal-month-spacer { width: 12px; flex-shrink: 0; }
.cal-week { display: flex; flex-direction: column; gap: 2px; }
.cal-cell { width: 12px; height: 12px; border-radius: 2px; background: var(--heat-l0); transition: outline 0.1s; position: relative; cursor: default; }
.cal-cell:hover { outline: 2px solid var(--accent); outline-offset: 1px; }
.cal-cell-l1 { background: var(--heat-l1); }
.cal-cell-l2 { background: var(--heat-l2); }

.cal-legend { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-bottom: 48px; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-muted-soft); }
.cal-legend-label { margin-right: 4px; }

.cal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 48px; }
.cal-stat-card { background: var(--bg-card); border: 1px solid var(--border-hairline); padding: 28px 24px; text-align: center; transition: border-color 0.15s, transform 0.15s; }

.cal-stat-number { font-family: "Playfair Display", Georgia, serif; font-size: 42px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 8px; }
.cal-stat-number-sm { font-family: "Playfair Display", Georgia, serif; font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
.cal-stat-label { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted-soft); }
.cal-stat-sub { font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted-pale); margin-top: 4px; }
.cal-goals { margin-bottom: 48px; }
.cal-goals-title { font-family: "Playfair Display", Georgia, serif; font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px; }

.cal-goal-stat { margin-bottom: 14px; }
.cal-goal-stat:last-child { margin-bottom: 0; }
.cal-goal-label { font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted-soft); margin-bottom: 6px; }
.cal-goal-numbers { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }

.cal-goal-bar { height: 6px; background: var(--bg-surface); overflow: hidden; }

.cal-milestone-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cal-milestone { background: var(--bg-card); border: 1px solid var(--border-hairline); padding: 16px 14px; text-align: center; transition: border-color 0.15s; }

.cal-milestone-label { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.cal-milestone-progress { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-muted-soft); }
.cal-milestone-bar { height: 4px; background: var(--bg-surface-hover); margin-top: 8px; overflow: hidden; }
.cal-milestone-bar-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
.footer { padding: 24px 48px; text-align: center; border-top: 1px solid var(--border-hairline); flex-shrink: 0; }
.footer-text { font-family: "JetBrains Mono", monospace; font-size: 14px; text-transform: uppercase; letter-spacing: 1.1px; color: var(--text-muted-soft); }
.footer-text a { color: var(--text-muted); text-decoration: none; }
.footer-text a:hover { color: var(--accent); }
.deploy-time { font-family: "JetBrains Mono", monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted-pale); margin-top: 6px; }
.footer-stats { font-family: "JetBrains Mono", monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted-pale); margin-top: 6px; }
@keyframes page-enter { from { opacity: 0; transform: translateY(8px); filter: blur(5px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; } }
.nav { animation: page-enter 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
.calendar-page-title { animation: page-enter 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94) 60ms both; }
.cal-stats { animation: page-enter 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94) 120ms both; }
.cal-heatmap-container { animation: page-enter 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94) 180ms both; }
@media (max-width: 767px) {
  .nav { padding: 16px 20px; position: sticky; top: 0; }
  .nav-right { position: static; order: 2; }
  .nav-links { visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-nav); border-bottom: 1px solid var(--border-hairline); flex-direction: column; padding: 0 20px; gap: 0; z-index: 100; transform: translateY(-10px); transition: opacity 300ms ease, transform 300ms ease, visibility 0s 300ms, padding 300ms ease; max-height: 0; overflow: hidden; }
  .nav-links.mobile-open { visibility: visible; opacity: 1; transform: translateY(0); padding: 16px 20px; max-height: 500px; transition: opacity 300ms ease, transform 300ms ease, visibility 0s, padding 300ms ease, max-height 300ms ease; }
  .nav-link { padding: 12px 0; font-size: 14px; border-bottom: 1px solid var(--border-hairline); width: 100%; }
  .nav-link:last-child { border-bottom: none; }
  .calendar-page { padding: 32px 20px; }
  .calendar-page-title { font-size: 28px; }
  .cal-stats { grid-template-columns: 1fr; }
  .cal-stat-number { font-size: 32px; }
  .cal-goals-grid { grid-template-columns: 1fr; }
  .cal-milestone-list { grid-template-columns: repeat(2, 1fr); }
}
html.transitioning, html.transitioning *, html.transitioning *::before, html.transitioning *::after { transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease !important; }
.dark-toggle { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--border-hairline); background: transparent; cursor: pointer; padding: 0; flex-shrink: 0; transition: border-color 0.15s, background 0.15s; border-radius: 8px; }
.dark-toggle:hover { border-color: var(--accent); background: var(--bg-surface); }
.dark-toggle svg { color: var(--text-muted); }
.theme-panel-backdrop { position: fixed; inset: 0; background: var(--overlay); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
.theme-panel-backdrop.show { opacity: 1; pointer-events: all; }
.theme-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.92); width: 340px; max-width: calc(100vw - 32px); background: var(--bg-body); border: 2px solid var(--border-strong); z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 24px; }

.theme-panel-section { margin-bottom: 20px; }

.theme-mode-toggle { display: flex; border: 1px solid var(--border-hairline); overflow: hidden; }

.theme-mode-option:hover { background: var(--bg-surface); }
.theme-mode-option.active { background: var(--text-primary); color: var(--bg-body); }
.theme-scheme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

.hamburger-btn { display: none; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--border-hairline); background: transparent; cursor: pointer; padding: 0; flex-shrink: 0; transition: border-color 0.15s, background 0.15s; border-radius: 8px; }

<script>
(function() {
  var dateMap = {"2026-06-03":1,"2026-05-24":1,"2026-05-25":1,"2026-05-27":1,"2026-06-05":2,"2026-05-28":1,"2026-05-26":1,"2026-05-30":1,"2026-05-29":1,"2026-05-31":1,"2026-06-01":1,"2026-06-02":2,"2026-06-04":1,"2026-06-06":1,"2026-06-07":1,"2026-06-09":1,"2026-06-10":1,"2026-06-12":1,"2026-06-13":1,"2026-06-14":1,"2026-06-19":1,"2026-06-20":1};
  var dailyWordMap = {"2026-06-03":1413,"2026-05-24":666,"2026-05-25":914,"2026-05-27":651,"2026-06-05":2353,"2026-05-28":904,"2026-05-26":889,"2026-05-30":840,"2026-05-29":535,"2026-05-31":898,"2026-06-01":668,"2026-06-02":1546,"2026-06-04":755,"2026-06-06":886,"2026-06-07":913,"2026-06-09":920,"2026-06-10":662,"2026-06-12":947,"2026-06-13":852,"2026-06-14":741,"2026-06-19":835,"2026-06-20":783};

  var allYears = [];
  for (var k in dateMap) { var y = parseInt(k.split("-")[0]); if (allYears.indexOf(y) === -1) allYears.push(y); }
  allYears.sort();
  var minYear = allYears.length > 0 ? allYears[0] : currentYear;
  var maxYear = allYears.length > 0 ? allYears[allYears.length - 1] : currentYear;
  function render() {
    document.getElementById("calYear").textContent = currentYear;
    document.getElementById("calPrev").disabled = currentYear <= minYear;
    document.getElementById("calNext").disabled = currentYear >= maxYear;
    var dayLabelsHtml = "";
    for (var di = 0; di < 7; di++) {
      dayLabelsHtml += '<div class="cal-day-label">' + (di % 2 === 1 ? dayLabels[di] : "") + '</div>';
    }
    document.getElementById("calDayLabels").innerHTML = dayLabelsHtml;
    var heatmap = document.getElementById("calHeatmap");
    var monthLabelsEl = document.getElementById("calMonthLabels");
    var html = "";
    var monthLabelsHtml = "";
    var startDate = new Date(currentYear, 0, 1);
    var endDate = new Date(currentYear, 11, 31);
    var startDay = startDate.getDay();
    var gridStart = new Date(startDate);
    gridStart.setDate(gridStart.getDate() - startDay);
    var tempDate = new Date(gridStart);
    var prevMonth = -1;
    while (tempDate <= endDate) {
      var curMonth = tempDate.getMonth();
      if (tempDate.getDay() === 0 && curMonth !== prevMonth) {
        monthLabelsHtml += '<div class="cal-month-label">' + monthNames[curMonth] + '</div>';
        prevMonth = curMonth;
      } else if (tempDate.getDay() === 0) {
        monthLabelsHtml += '<div class="cal-month-spacer"></div>';
      }
      tempDate.setDate(tempDate.getDate() + 1);
    }
    monthLabelsEl.innerHTML = monthLabelsHtml;
    var d = new Date(gridStart);
    html += '<div class="cal-week">';
    while (d <= endDate || d.getDay() !== 0) {
      var pad = function(n) { return n < 10 ? "0" + n : "" + n; };
      var key = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
      var count = dateMap[key] || 0;
      var inRange = d.getFullYear() === currentYear;
      var cls = "cal-cell";
      if (!inRange) { cls += " cal-cell-empty"; }
      else if (count === 1) { cls += " cal-cell-l1"; }
      else if (count === 2) { cls += " cal-cell-l2"; }
      else if (count >= 3 && count <= 4) { cls += " cal-cell-l3"; }
      else if (count >= 5) { cls += " cal-cell-l4"; }
      html += '<div class="' + cls + '" data-date="' + key + '" data-count="' + count + '"></div>';
      if (d.getDay() === 6 && d < endDate) { html += '</div><div class="cal-week">'; }
      d.setDate(d.getDate() + 1);
    }
    html += '</div>';
    heatmap.innerHTML = html;
    var cells = heatmap.querySelectorAll(".cal-cell:not(.cal-cell-empty)");
    var tooltip = document.getElementById("calTooltip");
    for (var ci = 0; ci < cells.length; ci++) {
      cells[ci].addEventListener("mouseenter", function(e) {
        var date = this.getAttribute("data-date");
        var count = parseInt(this.getAttribute("data-count"));
        var parts = date.split("-");
        tooltip.textContent = parts[0] + "年" + parseInt(parts[1]) + "月" + parseInt(parts[2]) + "日: " + count + "篇文章";
        tooltip.classList.add("cal-tooltip-show");
      });
      cells[ci].addEventListener("mousemove", function(e) {
        tooltip.style.left = (e.clientX + 12) + "px";
        tooltip.style.top = (e.clientY - 30) + "px";
      });
      cells[ci].addEventListener("mouseleave", function() {
        tooltip.classList.remove("cal-tooltip-show");
      });
    }
  }
  document.getElementById("calPrev").addEventListener("click", function() { if (currentYear > minYear) { currentYear--; render(); } });
  document.getElementById("calNext").addEventListener("click", function() { if (currentYear < maxYear) { currentYear++; render(); } });
  var GOAL_PERIODS = [
    { days: 30,  goalArticles: 30,  label: "30篇" },
    { days: 90,  goalArticles: 90,  label: "90篇" },
    { days: 180, goalArticles: 180, label: "180篇" }
  ];
  var WORD_MILESTONES = [100000, 200000, 300000, 500000, 750000, 1000000];
  var totalArticles = 0;
  for (var k in dateMap) totalArticles += dateMap[k];
  var now = new Date();
  var today = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");

  function getTrailingStats(days) {
    var cutoff = new Date(now - days * 86400000);
    var articles = 0, words = 0;
    for (var key in dateMap) {
      var parts = key.split("-");
      var d = new Date(+parts[0], +parts[1]-1, +parts[2]);
      if (d >= cutoff) {
        articles += dateMap[key] || 0;
        words += dailyWordMap[key] || 0;
      }
    }
    return { articles: articles, words: words };
  }

  function formatWords(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + "w";
    return n.toString();
  }
  function formatMilestone(n) { return formatWords(n); }

  function renderGoals() {
    // Period goals — articles only
    var grid = document.getElementById("calGoalsGrid");
    if (!grid) return;
    var gridHtml = "";
    GOAL_PERIODS.forEach(function(p) {
      var stats = getTrailingStats(p.days);
      var articlePct = Math.min(100, Math.round(stats.articles / p.goalArticles * 100));

      gridHtml += '  </div>';

    if (!mlist) return;
    var mhtml = "";
    WORD_MILESTONES.forEach(function(m) {
      var reached = totalWords >= m;
      var pct = Math.min(100, Math.round(totalWords / m * 100));
      mhtml += '<div class="cal-milestone' + (reached ? ' cal-milestone--reached' : '') + '">';
      mhtml += '  <div class="cal-milestone-label">' + formatMilestone(m) + '</div>';

      mhtml += '  <div class="cal-milestone-bar"><div class="cal-milestone-bar-fill" style="width:' + pct + '%"></div></div>';
      mhtml += '</div>';
    });
    mlist.innerHTML = mhtml;
  }
  renderGoals();
  render();
})();

function applyTheme() {
  var t = T[CURRENT_THEME];
  if (!t) return;
  var isDark = document.documentElement.classList.contains("dark-mode");
  var colors = isDark ? t.D : t.L;
  if (!colors) return;

  Object.keys(colors).forEach(function(k) {

  r.setAttribute("data-theme", CURRENT_THEME);
  r.style.setProperty("color-scheme", isDark ? "dark" : "light");

    localStorage.setItem("page2-theme", JSON.stringify({
      theme: CURRENT_THEME,
      dark: document.documentElement.classList.contains("dark-mode")
    }));
  } catch(e) {}
}

function toggleDark() {
  var html = document.documentElement;
  html.classList.add("transitioning");
  html.classList.toggle("dark-mode");
  applyTheme();
  saveThemeConfig();
  updatePanelUI();
  setTimeout(function() { html.classList.remove("transitioning"); }, 400);
}

function selectTheme(key) {
  if (key === CURRENT_THEME) return;
  CURRENT_THEME = key;
  applyTheme();
  saveThemeConfig();
  updatePanelUI();
}

function buildPanelHTML() {
  var h = "";
  h += '<div class="theme-panel-header">配色设置</div>';
  h += '<div class="theme-panel-section">';
  h += '<div class="theme-panel-label">显示模式</div>';
  h += '<div class="theme-mode-toggle">';
  h += '<button class="theme-mode-option" data-mode="light">浅色</button>';
  h += '<button class="theme-mode-option" data-mode="dark">深色</button>';
  h += '</div></div>';
  h += '<div class="theme-panel-section">';
  h += '<div class="theme-panel-label">配色主题</div>';
  h += '<div class="theme-scheme-grid">';
  Object.keys(T).forEach(function(k) {
    var t = T[k];
    h += '<button class="theme-scheme-card" data-theme="' + k + '">';
    h += '<span class="theme-scheme-swatches">';
    t.swatches.forEach(function(c) { h += '<span class="theme-scheme-swatch" style="background:' + c + '"></span>'; });
    h += '</span>';
    h += '<span class="theme-scheme-name">' + t.name + '</span>';
    h += '</button>';
  });
  h += '</div></div>';
  return h;
}

function injectPanel() {
  var backdrop = document.createElement("div");
  backdrop.className = "theme-panel-backdrop";
  backdrop.setAttribute("id", "themeBackdrop");
  backdrop.addEventListener("click", closePanel);
  document.body.appendChild(backdrop);
  var panel = document.createElement("div");
  panel.className = "theme-panel";
  panel.setAttribute("id", "themePanel");
  panel.innerHTML = buildPanelHTML();
  document.body.appendChild(panel);
  // Attach listeners
  panel.querySelectorAll(".theme-mode-option").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var mode = btn.dataset.mode;
      var isDark = document.documentElement.classList.contains("dark-mode");
      if ((mode === "dark" && !isDark) || (mode === "light" && isDark)) toggleDark();
    });
  });
  panel.querySelectorAll(".theme-scheme-card").forEach(function(card) {
    card.addEventListener("click", function() { selectTheme(card.dataset.theme); });
  });
}

function openPanel() {
  panelOpen = true;
  document.getElementById("themePanel").classList.add("show");
  document.getElementById("themeBackdrop").classList.add("show");
  document.body.style.overflow = "hidden";
  updatePanelUI();
}

function closePanel() {
  panelOpen = false;
  document.getElementById("themePanel").classList.remove("show");
  document.getElementById("themeBackdrop").classList.remove("show");
  document.body.style.overflow = "";
}

function updatePanelUI() {
  var panel = document.getElementById("themePanel");
  if (!panel) return;
  var isDark = document.documentElement.classList.contains("dark-mode");
  panel.querySelectorAll(".theme-mode-option").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.mode === (isDark ? "dark" : "light"));
  });
  panel.querySelectorAll(".theme-scheme-card").forEach(function(card) {
    card.classList.toggle("active", card.dataset.theme === CURRENT_THEME);
  });
}

window.__ThemeConfig = { getConfig: function() { return { theme: CURRENT_THEME, dark: document.documentElement.classList.contains("dark-mode"), name: T[CURRENT_THEME] ? T[CURRENT_THEME].name : "" }; } };

function initThemePanel() {
  injectPanel();
  applyTheme();
  var btn = document.getElementById("themeToggleBtn");
  if (btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      panelOpen ? closePanel() : openPanel();
    });
  }
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && panelOpen) closePanel();
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initThemePanel);
} else {
  initThemePanel();
}
</script>
<script>
function toggleMobileMenu() {
  var btn = document.getElementById("hamburgerBtn");
  var navLinks = document.querySelector(".nav-links");
  var overlay = document.getElementById("mobileMenuOverlay");
  var isOpen = btn.classList.toggle("active");
  navLinks.classList.toggle("mobile-open", isOpen);
  if (overlay) overlay.classList.toggle("open", isOpen);
  btn.setAttribute("aria-expanded", isOpen);
  document.body.style.overflow = isOpen ? "hidden" : "";
}
document.addEventListener("click", function(e) {
  var btn = document.getElementById("hamburgerBtn");
  var navLinks = document.querySelector(".nav-links");
  var overlay = document.getElementById("mobileMenuOverlay");
  if (btn && navLinks && navLinks.classList.contains("mobile-open")) {
    if (!btn.contains(e.target) && !navLinks.contains(e.target)) {
      btn.classList.remove("active");
      navLinks.classList.remove("mobile-open");
      if (overlay) overlay.classList.remove("open");
      btn.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
    }
  }
});
</script>
<script>
(function() {
  var STORAGE_KEY = "blog_history";
  var MAX_ITEMS = 50;
  var drawer, overlay, trigger, body, clearBtn, closeBtn;
  var isOpen = false;
  var isDragging = false;
  var dragStartY = 0;
  var dragStartTop = 0;
  var savedTop = null;

  // Helpers
  function getHistory() {
    try {
      var data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }
  function saveHistory(arr) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, MAX_ITEMS)));
    } catch(e) {}
  }

  function getPageInfo() {
    var title = document.title.split(" | ")[0].trim();
    var url = window.location.pathname + window.location.search + window.location.hash;
    var excerpt = "";
    // Try to get og:description or first paragraph
    var metaDesc = document.querySelector("meta[name=\"description\"]");
    if (metaDesc) excerpt = metaDesc.getAttribute("content") || "";
    if (!excerpt) {
      var firstP = document.querySelector(".article-body p, .page-body p, .blog-card-title");
      if (firstP) excerpt = firstP.textContent.trim().substring(0, 120);
    }
    return { id: url, title: title, url: url, excerpt: excerpt.substring(0, 150), time: new Date().toISOString() };
  }

  // Record current page visit
  function recordVisit() {
    // Skip homepage
    var path = window.location.pathname.replace(/\/$/, "") || "/";
    if (path === "/" || path === "/index.html") return;
    var info = getPageInfo();
    if (!info.title) return;
    var history = getHistory();
    // Remove duplicate if exists
    history = history.filter(function(item) { return item.id !== info.id; });
    // Add to front
    history.unshift(info);
    saveHistory(history);
  }

  // Format time
  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    var min = Math.floor(diff / 60000);
    if (min < 1) return "刚刚";
    if (min < 60) return min + " 分钟前";
    var hours = Math.floor(min / 60);
    if (hours < 24) return hours + " 小时前";
    var days = Math.floor(hours / 24);
    if (days < 7) return days + " 天前";
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
  }

  // Render history list
  function renderHistory() {
    if (!body) return;
    var history = getHistory();
    if (history.length === 0) {
      body.innerHTML = '<div class="history-empty"><div class="history-empty-icon">&#128218;</div><div class="history-empty-title">暂无浏览历史</div><div class="history-empty-desc">浏览博客文章后，您的阅读记录会出现在这里</div><div class="history-empty-guide">&#8592; 点击左侧按钮开始阅读</div></div>';
      return;
    }
    var html = "";
    history.forEach(function(item, index) {
      html += '<a class="history-item" href="' + item.url + '" data-index="' + index + '">';
      html += '  <div class="history-item-info">';
      html += '    <div class="history-item-title">' + item.title + '</div>';
      html += '    <div class="history-item-time">' + formatTime(item.time) + '</div>';
      html += '  </div>';
      html += '  <button class="history-item-delete" data-index="' + index + '" onclick="event.preventDefault();event.stopPropagation();deleteHistoryItem(' + index + ')" aria-label="删除">';
      html += '    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
      html += '  </button>';
      html += '</a>';
    });
    body.innerHTML = html;
  }

  // Open/close drawer
  function openDrawer() {
    isOpen = true;
    renderHistory();
    drawer.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  window.closeHistoryDrawer = function() {
    isOpen = false;
    drawer.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  };

  window.deleteHistoryItem = function(index) {
    var history = getHistory();
    history.splice(index, 1);
    saveHistory(history);
    renderHistory();
  };

  window.clearAllHistory = function() {
    if (confirm("确定要清空所有浏览历史吗？")) {
      saveHistory([]);
      renderHistory();
    }
  };

  // Drag functionality
  function initDrag() {
    if (!trigger) return;
    // Restore saved position
    try {
      savedTop = localStorage.getItem("history_trigger_top");
      if (savedTop !== null) {
        trigger.style.top = savedTop + "px";
        trigger.style.transform = "none";
      }
    } catch(e) {}

    trigger.addEventListener("pointerdown", function(e) {
      var rect = trigger.getBoundingClientRect();
      if (e.pointerType === "touch" && Math.abs(e.clientX - rect.right) > 50) return;
      isDragging = true;
      trigger.classList.add("dragging");
      dragStartY = e.clientY;
      dragStartTop = trigger.getBoundingClientRect().top;
      trigger.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    trigger.addEventListener("pointermove", function(e) {
      if (!isDragging) return;
      var deltaY = e.clientY - dragStartY;
      var newTop = dragStartTop + deltaY;
      var maxTop = window.innerHeight - trigger.offsetHeight - 10;
      newTop = Math.max(10, Math.min(newTop, maxTop));
      trigger.style.top = newTop + "px";
      trigger.style.transform = "none";
    });

    trigger.addEventListener("pointerup", function(e) {
      if (!isDragging) return;
      isDragging = false;
      trigger.classList.remove("dragging");
      trigger.releasePointerCapture(e.pointerId);
      // Did we drag? If moved less than 5px, treat as click
      var moved = Math.abs(e.clientY - dragStartY);
      if (moved < 5) {
        // It was a click, toggle drawer
        if (isOpen) {
          closeHistoryDrawer();
        } else {
          openDrawer();
        }
      } else {
        // Save position
        try { localStorage.setItem("history_trigger_top", trigger.style.top.replace("px", "")); } catch(e) {}
      }
    });

    trigger.addEventListener("pointercancel", function() {
      isDragging = false;
      trigger.classList.remove("dragging");
    });
  }

  // Init
  function init() {
    drawer = document.getElementById("historyDrawer");
    overlay = document.getElementById("historyOverlay");
    trigger = document.getElementById("historyTrigger");
    body = document.getElementById("historyBody");
    clearBtn = document.getElementById("historyClearBtn");
    closeBtn = document.getElementById("historyCloseBtn");

    if (!drawer || !trigger) return;

    // Close button
    if (closeBtn) closeBtn.addEventListener("click", closeHistoryDrawer);
    // Overlay click
    if (overlay) overlay.addEventListener("click", closeHistoryDrawer);
    // Clear button
    if (clearBtn) clearBtn.addEventListener("click", clearAllHistory);
    // ESC key
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && isOpen) closeHistoryDrawer();
    });

    initDrag();
    recordVisit();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
