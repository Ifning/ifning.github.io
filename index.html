<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>月见花园</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: #faf9f5; color: #141413; font-family: Inter, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
.nav { display: flex; align-items: center; justify-content: space-between; max-width: 1280px; margin: 0 auto; padding: 20px 48px; border-bottom: 1px solid #e6dfd8; width: 100%; flex-shrink: 0; }
.nav-brand { font-family: "Playfair Display", Georgia, serif; font-size: 24px; font-weight: 700; color: #141413; text-decoration: none; letter-spacing: -0.3px; }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-link { font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #6c6a64; text-decoration: none; transition: color 0.15s; }
.nav-link:hover { color: #cc785c; }
.hero { position: relative; flex: 1; overflow: hidden; }
.hero-avatar { position: absolute; top: 50%; left: 50%; width: 140px; height: 140px; border-radius: 50%; object-fit: cover; z-index: 2; animation: avatar-journey 1000ms cubic-bezier(0.22, 1, 0.36, 1) both; }
.hero-text { position: absolute; top: 50%; left: 50%; opacity: 0; animation: text-in 600ms cubic-bezier(0.22, 1, 0.36, 1) 700ms both; }
.hero-subtitle { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; color: #cc785c; margin-bottom: 10px; }
.hero-title { font-family: "Playfair Display", Georgia, serif; font-size: 52px; font-weight: 400; line-height: 1.1; letter-spacing: -1px; color: #141413; margin-bottom: 16px; }
.hero-desc { font-size: 16px; line-height: 1.5; color: #6c6a64; margin-bottom: 32px; }
.hero-actions { display: flex; gap: 16px; flex-wrap: wrap; opacity: 0; animation: actions-in 500ms cubic-bezier(0.22, 1, 0.36, 1) 1100ms both; }
.btn { display: inline-block; font-family: Inter, sans-serif; font-size: 14px; font-weight: 500; line-height: 1; padding: 13px 28px; text-decoration: none; transition: all 0.15s; cursor: pointer; border: none; }
.btn-primary { background: #cc785c; color: #fff; }
.btn-primary:hover { background: #a9583e; color: #fff; }
.btn-secondary { background: #faf9f5; color: #141413; border: 1px solid #e6dfd8; }
.btn-secondary:hover { background: #f5f0e8; border-color: #8e8b82; }
.btn-site { background: #3d3d3a; color: #fff; }
.btn-site:hover { background: #2d2d2a; color: #fff; }
.footer { padding: 24px 48px; text-align: center; border-top: 1px solid #e6dfd8; flex-shrink: 0; }
.footer-text { font-family: "JetBrains Mono", monospace; font-size: 14px; text-transform: uppercase; letter-spacing: 1.1px; color: #8e8b82; }
.footer-text a { color: #6c6a64; text-decoration: none; }
.footer-text a:hover { color: #cc785c; }
@keyframes avatar-journey {
  0% { opacity: 0; transform: translate(-50%, calc(-50% + 100px)) scale(0.8); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 1; transform: translate(calc(-50% - 140px), -50%) scale(1); }
}
@keyframes text-in {
  0% { opacity: 0; transform: translateY(calc(-50% + 14px)); filter: blur(4px); }
  100% { opacity: 1; transform: translateY(-50%); filter: blur(0); }
}
@keyframes actions-in {
  0% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}
@media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; } }
@media (max-width: 767px) {
  .nav { padding: 16px 20px; }
  .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .hero-avatar { position: static; width: 100px; height: 100px; margin-bottom: 24px; animation: avatar-rise-mobile 600ms cubic-bezier(0.22, 1, 0.36, 1) both; }
  .hero-text { position: static; transform: none; text-align: center; animation: text-in-mobile 500ms cubic-bezier(0.22, 1, 0.36, 1) 600ms both; }
  .hero-title { font-size: 36px; }
  .hero-actions { justify-content: center; animation: actions-in 500ms cubic-bezier(0.22, 1, 0.36, 1) 900ms both; }
  .btn { width: 100%; text-align: center; }
  .nav-links { gap: 16px; }
  .nav-link { font-size: 12px; }
}
@keyframes avatar-rise-mobile {
  0% { opacity: 0; transform: translateY(40px) scale(0.85); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes text-in-mobile {
  0% { opacity: 0; transform: translateY(12px); filter: blur(4px); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand">月见花园</a>
  <div class="nav-links">
    <a href="/" class="nav-link">首页</a>
    <a href="/blog/" class="nav-link">博客</a>
    <a href="/about/" class="nav-link">关于</a>
    <a href="/tags/" class="nav-link">标签</a>
    <a href="/archives/" class="nav-link">归档</a>
  </div>
</nav>
<section class="hero">
  <img class="hero-avatar" src="/images/head.png" alt="Avatar">
  <div class="hero-text">
    <p class="hero-subtitle">记录月见草</p>
    <h1 class="hero-title">月见花园</h1>
    <p class="hero-desc">一个用 Hexo 搭建的个人博客</p>
    <div class="hero-actions">
      <a class="btn btn-primary" href="/blog/">阅读博客</a>
      <a class="btn btn-secondary" href="/about/">关于我</a>
      <a class="btn btn-site" href="https://gaizhedu.com/">主站</a>
    </div>
  </div>
</section>
<footer class="footer">
  <p class="footer-text">&copy; 2026 John Doe &middot; Powered by <a href="https://hexo.io">Hexo</a></p>
</footer>
</body>
</html>
