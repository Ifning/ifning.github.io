<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf9f5; color: #141413; font-family: Inter, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
.nav { display: flex; align-items: center; justify-content: space-between; max-width: 1280px; margin: 0 auto; padding: 20px 48px; border-bottom: 1px solid #e6dfd8; position: sticky; top: 0; z-index: 10; background: #faf9f5; }

.tags-pill-count { font-size: 10px; opacity: 0.7; }
.tags-group { margin-bottom: 48px; }

.tags-group-count { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 400; color: #8e8b82; }
.blog-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.blog-card { display: flex; flex-direction: column; justify-content: space-between; padding: 22px 24px; background: #ffffff; border: 1px solid #e6dfd8; min-height: 140px; text-decoration: none; transition: border-color 0.15s, transform 0.15s; cursor: pointer; }
.blog-card:hover { border-color: #cc785c; transform: translateY(-2px); }
.blog-card-title { font-family: "Playfair Display", Georgia, serif; font-size: 20px; font-weight: 600; line-height: 1.3; color: #141413; margin-bottom: 16px; }
.blog-card:hover .blog-card-title { color: #cc785c; }
.blog-card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
.blog-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.blog-card-tag { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #cc785c; background: #f5f0e8; padding: 3px 8px; }
.blog-card-tag-empty { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #8e8b82; background: #f5f0e8; padding: 3px 8px; }
.blog-card-words { font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.1px; color: #8e8b82; white-space: nowrap; }
.footer { padding: 40px 48px; text-align: center; border-top: 1px solid #e6dfd8; }
.footer-text { font-family: "JetBrains Mono", monospace; font-size: 14px; text-transform: uppercase; letter-spacing: 1.1px; color: #8e8b82; }
.footer-text a { color: #6c6a64; text-decoration: none; }
.footer-text a:hover { color: #cc785c; }
@keyframes page-enter { from { opacity: 0; transform: translateY(8px); filter: blur(5px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; } }
.nav { animation: page-enter 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

@media (max-width: 767px) { .nav { padding: 16px 20px; } .tags-page { padding: 32px 20px; } .tags-page-title { font-size: 28px; } .blog-cards { grid-template-columns: 1fr; } .tags-selector { gap: 8px; } .tags-pill { font-size: 11px; padding: 6px 12px; } .nav-links { gap: 16px; } .nav-link { font-size: 12px; } }
</style>

<body>

    <button class="tags-pill" data-tag="技术" onclick="switchTag('技术')">技术<span class="tags-pill-count">1</span></button>
    <button class="tags-pill" data-tag="__notag__" onclick="switchTag('__notag__')">无标签<span class="tags-pill-count">2</span></button>

      <h2 class="tags-group-header">日常 <span class="tags-group-count">1</span></h2>

      </div>

    <div class="tags-group">
      <h2 class="tags-group-header">技术 <span class="tags-group-count">1</span></h2>
      <div class="blog-cards">
        <a href="/posts/2026-06-17/normal-test-2/" class="blog-card">

          <div class="blog-card-footer">
            <div class="blog-card-tags">
              <span class="blog-card-tag">技术</span>
            </div>
            <span class="blog-card-words">38 字</span>
          </div>
        </a>
      </div>
    </div>
    <div class="tags-group">
      <h2 class="tags-group-header">无标签 <span class="tags-group-count">2</span></h2>
      <div class="blog-cards">
        <a href="/posts/2026-06-17/hello-world/" class="blog-card">
          <div class="blog-card-title">Hello World</div>

  </div>
  <div id="tag-日常" style="display:none;">
    <div class="tags-group">
      <h2 class="tags-group-header">日常 <span class="tags-group-count">1</span></h2>
      <div class="blog-cards">

        </a>
      </div>

  </div>
</div>
<script>
function switchTag(tag) {
  var pills = document.querySelectorAll(".tags-pill");
  pills.forEach(function(p) { p.classList.remove("tags-pill-active"); });
  var activePill = document.querySelector('.tags-pill[data-tag="' + tag + '"]');
  if (activePill) activePill.classList.add("tags-pill-active");
  document.getElementById("tagAll").style.display = tag === "all" ? "block" : "none";
  document.getElementById("tag-日常").style.display = tag === "日常" ? "block" : "none";
  document.getElementById("tag-技术").style.display = tag === "技术" ? "block" : "none";
  document.getElementById("tag-__notag__").style.display = tag === "__notag__" ? "block" : "none";
}
</script>
